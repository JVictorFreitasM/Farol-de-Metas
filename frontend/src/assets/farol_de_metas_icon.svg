    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7c948" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f7c948" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#f7c948" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f7c948" stop-opacity="0"/>
